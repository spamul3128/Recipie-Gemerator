server {
  host = "localhost"
  host = ${?SERVER_HOST}
  port = 8080
  port = ${?SERVER_PORT}
}

openai {
  # Set via environment variable OPENAI_API_KEY (recommended)
  # or replace the placeholder below for local development only.
  api-key = "YOUR_OPENAI_API_KEY_HERE"
  api-key = ${?OPENAI_API_KEY}
  model   = "gpt-4o-mini"
  timeout-seconds = 45
}

akka {
  loglevel = "INFO"
  http.server.idle-timeout = 60s
}

